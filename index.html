<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emilia's Pixel Adventure</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; script-src 'self'">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="no-referrer">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>⚔️</text></svg>">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
      canvas { display: block; }

      /* Loading Screen */
      #loading-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: linear-gradient(135deg, #1a3a2a 0%, #2d5a27 50%, #1a4a3a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        transition: opacity 0.5s ease;
      }
      .loading-content {
        text-align: center;
        color: #fff;
      }
      .loading-content h1 {
        font-size: 2.5rem;
        margin-bottom: 2rem;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        color: #ffdd88;
      }
      .loading-bar-bg {
        width: 300px;
        height: 20px;
        background: rgba(0,0,0,0.4);
        border-radius: 10px;
        overflow: hidden;
        margin: 0 auto;
      }
      .loading-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #77dd77, #ffdd55);
        border-radius: 10px;
        transition: width 0.2s ease;
      }
      #loading-text {
        margin-top: 1rem;
        font-size: 1rem;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
